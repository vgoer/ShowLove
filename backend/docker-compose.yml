version: "3.9"

# =============================================================================
# Show Love - 开发环境 Docker Compose
# 一键启动全部基础设施 + 微服务
# =============================================================================

services:
  # ========== 基础设施 ==========

  postgres:
    image: postgres:15-alpine
    container_name: showlove-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_MULTIPLE_DATABASES: users_db,posts_db,comments_db,moods_db,quotes_db,notifications_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U showlove"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: showlove-redis
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: showlove-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO 自动创建 bucket
  minio-init:
    image: minio/mc:latest
    container_name: showlove-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/showlove --ignore-existing;
      mc anonymous set download local/showlove;
      echo '✅ MinIO bucket showlove 创建完成';
      exit 0;
      "

  nats:
    image: nats:2.10-alpine
    container_name: showlove-nats
    command: -js -m 8222
    ports:
      - "4222:4222"   # Client
      - "8222:8222"    # HTTP Monitoring
    healthcheck:
      test: ["CMD", "nats", "server", "check", "connection"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
    name: showlove_pgdata
  redisdata:
    name: showlove_redisdata
  miniodata:
    name: showlove_miniodata
