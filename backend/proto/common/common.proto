syntax = "proto3";

package common;

option go_package = "showlove/proto/common;commonpb";

import "google/protobuf/timestamp.proto";

// Pagination is the standard pagination request.
message Pagination {
  int32 page = 1;  // 1-based page number
  int32 page_size = 2;  // items per page (default 20, max 100)
}

// PaginatedResponse wraps paginated results.
message PaginatedResponse {
  int32 page = 1;
  int32 page_size = 2;
  int64 total = 3;
}

// Error represents a structured error response.
message Error {
  int32 code = 1;
  string message = 2;
  string detail = 3;
}
