syntax = "proto3";

package post;

option go_package = "showlove/proto/post;postpb";

import "google/protobuf/timestamp.proto";
import "proto/common/common.proto";

// ========== Models ==========

message Post {
  string id = 1;
  string author_id = 2;
  string author_nickname = 3;
  string author_avatar = 4;
  string content = 5;
  string mood_tag = 6;
  repeated string images = 7;
  string voice_url = 8;
  int32 sticker_hug = 9;
  int32 sticker_cheer = 10;
  int32 sticker_understand = 11;
  int32 comment_count = 12;
  bool has_ai_reply = 13;
  bool is_reported = 14;
  bool is_hidden = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
}

enum SortOrder {
  LATEST = 0;
  MOST_HELPED = 1;
}

enum StickerType {
  HUG = 0;
  CHEER = 1;
  UNDERSTAND = 2;
}

// ========== Requests & Responses ==========

message CreatePostRequest {
  string author_id = 1;
  string content = 2;
  string mood_tag = 3;
  repeated string images = 4;  // uploaded image URLs
  string voice_url = 5;
}

message CreatePostResponse {
  Post post = 1;
}

message GetPostRequest {
  string post_id = 1;
}

message GetPostResponse {
  Post post = 1;
}

message ListPostsRequest {
  SortOrder sort = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListPostsResponse {
  repeated Post posts = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}

message DeletePostRequest {
  string post_id = 1;
  string user_id = 2;  // for authorization
}

message DeletePostResponse {}

message SendStickerRequest {
  string post_id = 1;
  string user_id = 2;
  StickerType sticker_type = 3;
}

message SendStickerResponse {
  Post post = 1;
}

message ReportPostRequest {
  string post_id = 1;
  string user_id = 2;
  string reason = 3;
}

message ReportPostResponse {}

// ========== Service ==========

service PostService {
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);
  rpc GetPost(GetPostRequest) returns (GetPostResponse);
  rpc ListPosts(ListPostsRequest) returns (ListPostsResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  rpc SendSticker(SendStickerRequest) returns (SendStickerResponse);
  rpc ReportPost(ReportPostRequest) returns (ReportPostResponse);
}
